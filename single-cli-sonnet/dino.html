<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f7f7f7;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    user-select: none;
  }
  #score-container {
    width: 800px;
    display: flex;
    justify-content: flex-end;
    padding: 4px 0;
    color: #535353;
    font-size: 16px;
    letter-spacing: 2px;
  }
  #hi-score { margin-right: 16px; color: #aaa; }
  canvas {
    background: #f7f7f7;
    cursor: pointer;
    display: block;
  }
  #message {
    margin-top: 12px;
    color: #535353;
    font-size: 13px;
    letter-spacing: 1px;
    height: 18px;
  }
</style>
</head>
<body>
<div id="score-container">
  <span id="hi-score">HI 00000</span>
  <span id="score">00000</span>
</div>
<canvas id="c" width="800" height="300"></canvas>
<div id="message">PRESS SPACE / TAP TO START</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND = H - 50;

// ─── Pixel-art sprites drawn with ctx ───────────────────────────────────────

function drawDino(x, y, frame, ducking) {
  ctx.fillStyle = '#535353';
  if (ducking) {
    // body wide
    ctx.fillRect(x, y + 14, 46, 18);
    // head
    ctx.fillRect(x + 28, y + 6, 18, 14);
    // eye
    ctx.fillStyle = '#f7f7f7';
    ctx.fillRect(x + 38, y + 8, 4, 4);
    ctx.fillStyle = '#535353';
    // legs
    const lx = frame === 0 ? [x+4, x+18] : [x+10, x+24];
    ctx.fillRect(lx[0], y + 30, 8, 10);
    ctx.fillRect(lx[1], y + 30, 8, 10);
  } else {
    // body
    ctx.fillStyle = '#535353';
    ctx.fillRect(x + 4, y + 12, 28, 28);
    // head
    ctx.fillRect(x + 16, y, 26, 24);
    // eye
    ctx.fillStyle = '#f7f7f7';
    ctx.fillRect(x + 32, y + 4, 5, 5);
    ctx.fillStyle = '#535353';
    // arm
    ctx.fillRect(x + 10, y + 22, 10, 6);
    // tail
    ctx.fillRect(x, y + 24, 10, 8);
    ctx.fillRect(x, y + 16, 6, 12);
    // legs
    const lx = frame === 0 ? [x+8, x+20] : [x+14, x+6];
    ctx.fillStyle = '#535353';
    ctx.fillRect(lx[0], y + 38, 8, 14);
    ctx.fillRect(lx[1], y + 38, 8, 14);
  }
}

function drawCactus(x, y, type) {
  ctx.fillStyle = '#535353';
  if (type === 0) {
    // small single
    ctx.fillRect(x + 6, y, 10, 46);
    ctx.fillRect(x, y + 10, 22, 10);
    ctx.fillRect(x, y + 10, 8, 26);
    ctx.fillRect(x + 14, y + 10, 8, 26);
  } else if (type === 1) {
    // tall single
    ctx.fillRect(x + 7, y - 12, 10, 58);
    ctx.fillRect(x, y + 8, 24, 10);
    ctx.fillRect(x, y + 8, 8, 30);
    ctx.fillRect(x + 16, y + 8, 8, 30);
  } else {
    // double cluster
    drawCactus(x, y, 0);
    drawCactus(x + 20, y + 4, 0);
  }
}

function drawBird(x, y, frame) {
  ctx.fillStyle = '#535353';
  // body
  ctx.fillRect(x + 4, y + 8, 28, 12);
  // beak
  ctx.fillRect(x + 32, y + 10, 10, 6);
  // eye
  ctx.fillStyle = '#f7f7f7';
  ctx.fillRect(x + 28, y + 8, 4, 4);
  ctx.fillStyle = '#535353';
  // wings
  if (frame === 0) {
    ctx.fillRect(x + 6, y, 20, 8);
  } else {
    ctx.fillRect(x + 6, y + 18, 20, 8);
  }
}

function drawCloud(x, y) {
  ctx.fillStyle = '#e0e0e0';
  ctx.fillRect(x + 10, y + 8, 50, 14);
  ctx.fillRect(x + 20, y, 30, 20);
  ctx.fillRect(x, y + 12, 20, 10);
  ctx.fillRect(x + 56, y + 10, 16, 12);
}

// ─── Game State ──────────────────────────────────────────────────────────────

const STATE = { IDLE: 0, RUNNING: 1, DEAD: 2 };
let state = STATE.IDLE;
let score = 0, hiScore = 0, frames = 0;
let speed = 6;
let nightMode = false;

const dino = {
  x: 80, y: GROUND - 52,
  vy: 0, jumping: false, ducking: false,
  frame: 0, frameTimer: 0,
  width: 44, height: 52,
  duckWidth: 60, duckHeight: 32,
};

let obstacles = [];
let clouds = [];
let groundX = 0;
let flashTimer = 0;

// ─── Input ───────────────────────────────────────────────────────────────────

function jump() {
  if (state === STATE.IDLE || state === STATE.DEAD) { startGame(); return; }
  if (!dino.jumping && !dino.ducking) {
    dino.vy = -18;
    dino.jumping = true;
  }
}

function duck(on) {
  if (state !== STATE.RUNNING) return;
  dino.ducking = on;
  if (on && dino.jumping) { dino.vy += 6; }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
  if (e.code === 'ArrowDown') { e.preventDefault(); duck(true); }
});
document.addEventListener('keyup', e => {
  if (e.code === 'ArrowDown') duck(false);
});
canvas.addEventListener('pointerdown', jump);

// ─── Game logic ───────────────────────────────────────────────────────────────

function startGame() {
  state = STATE.RUNNING;
  score = 0; frames = 0; speed = 6;
  obstacles = []; clouds = [];
  dino.y = GROUND - 52; dino.vy = 0;
  dino.jumping = false; dino.ducking = false;
  document.getElementById('message').textContent = '';
  nightMode = false;
}

function spawnObstacle() {
  const minGap = Math.max(300, 600 - speed * 20);
  const last = obstacles[obstacles.length - 1];
  if (last && last.x > W - minGap) return;

  const roll = Math.random();
  if (speed > 10 && roll < 0.25) {
    // bird
    const heights = [GROUND - 30, GROUND - 60, GROUND - 100];
    const hy = heights[Math.floor(Math.random() * heights.length)];
    obstacles.push({ kind: 'bird', x: W + 20, y: hy, frame: 0, frameTimer: 0 });
  } else {
    const type = Math.floor(Math.random() * 3);
    obstacles.push({ kind: 'cactus', x: W + 20, y: GROUND - 46, type });
  }
}

function spawnCloud() {
  if (clouds.length < 4 && Math.random() < 0.004) {
    clouds.push({ x: W + 80, y: 40 + Math.random() * 60 });
  }
}

function getHitbox(o) {
  if (o.kind === 'cactus') {
    const w = o.type === 2 ? 42 : 22;
    return { x: o.x + 4, y: o.y, w: w - 4, h: 46 };
  }
  return { x: o.x + 4, y: o.y + 4, w: 34, h: 20 };
}

function dinoHitbox() {
  if (dino.ducking) return { x: dino.x + 4, y: GROUND - 30, w: 52, h: 28 };
  return { x: dino.x + 10, y: dino.y + 4, w: 26, h: 44 };
}

function collides(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function update() {
  if (state !== STATE.RUNNING) return;

  frames++;
  speed = 6 + frames / 700;
  if (frames % 700 < 1) nightMode = !nightMode;

  // Dino physics
  if (!dino.ducking) {
    dino.vy += 1.1;
    dino.y += dino.vy;
  }
  if (dino.y >= GROUND - 52) {
    dino.y = GROUND - 52;
    dino.vy = 0;
    dino.jumping = false;
  }

  // Dino animation
  dino.frameTimer++;
  if (dino.frameTimer > 6) { dino.frame = 1 - dino.frame; dino.frameTimer = 0; }

  // Obstacles
  spawnObstacle();
  for (let o of obstacles) {
    o.x -= speed;
    if (o.kind === 'bird') {
      o.frameTimer++;
      if (o.frameTimer > 8) { o.frame = 1 - o.frame; o.frameTimer = 0; }
    }
  }
  obstacles = obstacles.filter(o => o.x > -80);

  // Clouds
  spawnCloud();
  for (let c of clouds) c.x -= speed * 0.3;
  clouds = clouds.filter(c => c.x > -100);

  // Collision
  const dh = dinoHitbox();
  for (let o of obstacles) {
    if (collides(dh, getHitbox(o))) {
      state = STATE.DEAD;
      flashTimer = 4;
      if (score > hiScore) hiScore = score;
      document.getElementById('message').textContent = 'GAME OVER — PRESS SPACE / TAP TO RESTART';
      document.getElementById('hi-score').textContent = 'HI ' + String(Math.floor(hiScore)).padStart(5, '0');
      return;
    }
  }

  // Score
  score += speed / 10;
  document.getElementById('score').textContent = String(Math.floor(score)).padStart(5, '0');

  groundX = (groundX - speed) % W;
}

// ─── Render ──────────────────────────────────────────────────────────────────

function render() {
  const bg = nightMode ? '#1a1a2e' : '#f7f7f7';
  const fg = nightMode ? '#e0e0e0' : '#535353';

  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Clouds
  for (let c of clouds) drawCloud(c.x, c.y);

  // Ground line
  ctx.fillStyle = fg;
  ctx.fillRect(0, GROUND, W, 3);

  // Ground dots / pebbles
  ctx.fillStyle = nightMode ? '#555' : '#bbb';
  for (let i = 0; i < 40; i++) {
    const px = ((groundX + i * 22) % W + W) % W;
    ctx.fillRect(px, GROUND + 6, 4, 2);
  }
  for (let i = 0; i < 20; i++) {
    const px = ((groundX + i * 45 + 10) % W + W) % W;
    ctx.fillRect(px, GROUND + 12, 2, 2);
  }

  // Obstacles
  for (let o of obstacles) {
    ctx.save();
    ctx.fillStyle = fg;
    if (o.kind === 'cactus') drawCactus(o.x, o.y, o.type);
    else drawBird(o.x, o.y, o.frame);
    ctx.restore();
  }

  // Dino (flash red on death)
  if (state === STATE.DEAD && flashTimer % 2 === 1) {
    ctx.fillStyle = '#e00';
  } else {
    ctx.fillStyle = fg;
  }
  if (flashTimer > 0) flashTimer--;

  const dy = dino.ducking ? GROUND - 32 : dino.y;
  drawDino(dino.x, dy, dino.jumping ? 0 : dino.frame, dino.ducking);

  // Idle screen
  if (state === STATE.IDLE) {
    ctx.fillStyle = '#535353';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('DINO RUNNER', W / 2, H / 2 - 20);
    ctx.font = '14px monospace';
    ctx.fillText('Press SPACE or tap to start', W / 2, H / 2 + 10);
    ctx.textAlign = 'left';
  }
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
