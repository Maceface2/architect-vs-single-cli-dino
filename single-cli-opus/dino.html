<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dino Runner</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #f7f7f7;
    font-family: 'Courier New', monospace;
    user-select: none;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #wrap {
    position: relative;
  }
  canvas {
    background: #f7f7f7;
    display: block;
    image-rendering: pixelated;
  }
  #hint {
    margin-top: 10px;
    color: #666;
    font-size: 13px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="800" height="220"></canvas>
</div>
<div id="hint">SPACE / ↑ to jump &nbsp;·&nbsp; ↓ to duck &nbsp;·&nbsp; SPACE to restart</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  const GROUND_Y = 180;
  const GRAVITY = 0.7;
  const JUMP_V = -13;
  const DUCK_JUMP_V = -9;

  const state = {
    running: false,
    over: false,
    started: false,
    speed: 6,
    maxSpeed: 14,
    score: 0,
    hi: parseInt(localStorage.getItem('dino_hi') || '0', 10),
    obstacles: [],
    clouds: [],
    groundOffset: 0,
    groundBumps: [],
    spawnTimer: 0,
    cloudTimer: 0,
    frame: 0,
    flash: 0,
  };

  const dino = {
    x: 50,
    y: GROUND_Y,
    w: 44,
    h: 47,
    vy: 0,
    onGround: true,
    ducking: false,
    legFrame: 0,
    deadFrame: false,
  };

  // Pre-generate ground bumps for parallax
  for (let i = 0; i < 200; i++) {
    state.groundBumps.push({ x: i * 20 + Math.random() * 15, len: 2 + Math.random() * 6 });
  }

  // Input
  const keys = {};
  document.addEventListener('keydown', (e) => {
    if (['Space', 'ArrowUp', 'ArrowDown'].includes(e.code)) e.preventDefault();
    keys[e.code] = true;

    if (!state.started && (e.code === 'Space' || e.code === 'ArrowUp')) {
      start();
    } else if (state.over && e.code === 'Space') {
      reset();
      start();
    } else if (state.running) {
      if ((e.code === 'Space' || e.code === 'ArrowUp') && dino.onGround) {
        dino.vy = dino.ducking ? DUCK_JUMP_V : JUMP_V;
        dino.onGround = false;
      }
      if (e.code === 'ArrowDown') {
        dino.ducking = true;
      }
    }
  });
  document.addEventListener('keyup', (e) => {
    keys[e.code] = false;
    if (e.code === 'ArrowDown') dino.ducking = false;
  });

  function reset() {
    state.over = false;
    state.speed = 6;
    state.score = 0;
    state.obstacles = [];
    state.clouds = [];
    state.spawnTimer = 0;
    state.cloudTimer = 0;
    state.frame = 0;
    state.flash = 0;
    dino.y = GROUND_Y;
    dino.vy = 0;
    dino.onGround = true;
    dino.ducking = false;
    dino.deadFrame = false;
  }

  function start() {
    state.started = true;
    state.running = true;
  }

  function spawnObstacle() {
    // Birds only after some score
    const allowBird = state.score > 300;
    const r = Math.random();
    if (allowBird && r < 0.25) {
      // Pterodactyl at one of three heights
      const heights = [GROUND_Y - 10, GROUND_Y - 35, GROUND_Y - 60];
      const yTop = heights[Math.floor(Math.random() * heights.length)];
      state.obstacles.push({
        type: 'bird',
        x: W + 20,
        y: yTop,
        w: 46,
        h: 30,
        wing: 0,
      });
    } else {
      // Cactus cluster
      const variants = [
        { w: 17, h: 35, count: 1 },
        { w: 17, h: 35, count: 2 },
        { w: 17, h: 35, count: 3 },
        { w: 25, h: 50, count: 1 },
        { w: 25, h: 50, count: 2 },
      ];
      const v = variants[Math.floor(Math.random() * variants.length)];
      const totalW = v.w * v.count + (v.count - 1) * 2;
      state.obstacles.push({
        type: 'cactus',
        x: W + 20,
        y: GROUND_Y + 17 - v.h,
        w: totalW,
        h: v.h,
        unitW: v.w,
        unitH: v.h,
        count: v.count,
      });
    }
  }

  function spawnCloud() {
    state.clouds.push({
      x: W + 20,
      y: 30 + Math.random() * 70,
      w: 46,
      h: 14,
    });
  }

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
  }

  function update() {
    state.frame++;

    if (!state.running) return;

    // Speed ramp
    if (state.speed < state.maxSpeed) state.speed += 0.0015;

    // Score
    state.score += 0.1 * (state.speed / 6);
    if (Math.floor(state.score) > 0 && Math.floor(state.score) % 100 === 0) {
      state.flash = 12;
    }

    // Dino physics
    if (!dino.onGround) {
      dino.vy += GRAVITY;
      dino.y += dino.vy;
      if (dino.y >= GROUND_Y) {
        dino.y = GROUND_Y;
        dino.vy = 0;
        dino.onGround = true;
      }
    }
    if (state.frame % 6 === 0) dino.legFrame ^= 1;

    // Ground scroll
    state.groundOffset = (state.groundOffset + state.speed) % 4000;

    // Spawn obstacles
    state.spawnTimer -= state.speed;
    if (state.spawnTimer <= 0) {
      spawnObstacle();
      // Distance between obstacles depends on speed
      const minGap = 250;
      const variance = 350;
      state.spawnTimer = minGap + Math.random() * variance;
    }

    // Spawn clouds
    state.cloudTimer -= 1;
    if (state.cloudTimer <= 0) {
      spawnCloud();
      state.cloudTimer = 80 + Math.random() * 180;
    }

    // Move + cull obstacles
    for (const o of state.obstacles) {
      o.x -= state.speed;
      if (o.type === 'bird' && state.frame % 8 === 0) o.wing ^= 1;
    }
    state.obstacles = state.obstacles.filter(o => o.x + o.w > -10);

    // Move + cull clouds
    for (const c of state.clouds) c.x -= state.speed * 0.4;
    state.clouds = state.clouds.filter(c => c.x + c.w > -10);

    // Collision
    const dinoBox = getDinoHitbox();
    for (const o of state.obstacles) {
      // Tighter hitbox for obstacles
      const pad = 4;
      const ob = { x: o.x + pad, y: o.y + pad, w: o.w - pad * 2, h: o.h - pad * 2 };
      if (rectsOverlap(dinoBox, ob)) {
        gameOver();
        break;
      }
    }

    if (state.flash > 0) state.flash--;
  }

  function getDinoHitbox() {
    if (dino.ducking && dino.onGround) {
      return { x: dino.x + 4, y: dino.y + 25, w: 55, h: 22 };
    }
    return { x: dino.x + 6, y: dino.y + 4, w: 32, h: 43 };
  }

  function gameOver() {
    state.running = false;
    state.over = true;
    dino.deadFrame = true;
    if (Math.floor(state.score) > state.hi) {
      state.hi = Math.floor(state.score);
      localStorage.setItem('dino_hi', state.hi);
    }
  }

  // ---------- Drawing ----------

  function drawGround() {
    ctx.strokeStyle = '#535353';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y + 47);
    ctx.lineTo(W, GROUND_Y + 47);
    ctx.stroke();

    // Bumps
    ctx.beginPath();
    for (const b of state.groundBumps) {
      const x = (b.x - state.groundOffset) % 4000;
      const drawX = x < 0 ? x + 4000 : x;
      if (drawX > -10 && drawX < W) {
        ctx.moveTo(drawX, GROUND_Y + 50);
        ctx.lineTo(drawX + b.len, GROUND_Y + 50);
      }
    }
    ctx.stroke();
  }

  function drawCloud(c) {
    ctx.fillStyle = '#c8c8c8';
    // Simple pixel cloud
    const x = c.x, y = c.y;
    ctx.fillRect(x + 8, y, 30, 4);
    ctx.fillRect(x + 4, y + 4, 38, 4);
    ctx.fillRect(x, y + 8, 46, 4);
    ctx.fillRect(x + 4, y + 12, 30, 2);
  }

  function drawCactus(o) {
    ctx.fillStyle = '#535353';
    for (let i = 0; i < o.count; i++) {
      const cx = o.x + i * (o.unitW + 2);
      const cy = o.y;
      const w = o.unitW;
      const h = o.unitH;
      // Stem
      ctx.fillRect(cx + w * 0.35, cy, w * 0.3, h);
      // Arms
      ctx.fillRect(cx, cy + h * 0.25, w * 0.35, w * 0.3);
      ctx.fillRect(cx, cy + h * 0.1, w * 0.15, h * 0.4);
      ctx.fillRect(cx + w * 0.65, cy + h * 0.4, w * 0.35, w * 0.3);
      ctx.fillRect(cx + w * 0.85, cy + h * 0.2, w * 0.15, h * 0.45);
      // Top spikes
      ctx.fillRect(cx + w * 0.4, cy - 3, w * 0.2, 3);
    }
  }

  function drawBird(o) {
    ctx.fillStyle = '#535353';
    const x = o.x, y = o.y;
    // Body
    ctx.fillRect(x + 14, y + 12, 22, 6);
    ctx.fillRect(x + 30, y + 8, 10, 6);
    // Beak
    ctx.fillRect(x + 38, y + 10, 8, 3);
    // Eye gap
    ctx.fillStyle = '#f7f7f7';
    ctx.fillRect(x + 33, y + 10, 2, 2);
    ctx.fillStyle = '#535353';
    // Wings — alternate up/down
    if (o.wing === 0) {
      // Wings up
      ctx.fillRect(x + 16, y, 16, 4);
      ctx.fillRect(x + 20, y + 4, 10, 4);
    } else {
      // Wings down
      ctx.fillRect(x + 16, y + 18, 16, 4);
      ctx.fillRect(x + 20, y + 22, 10, 4);
    }
    // Tail
    ctx.fillRect(x + 8, y + 12, 6, 4);
  }

  function drawDino() {
    ctx.fillStyle = '#535353';
    const x = dino.x, y = dino.y;

    if (dino.ducking && dino.onGround) {
      // Ducking dino — long & low
      // Body
      ctx.fillRect(x + 4, y + 28, 50, 14);
      // Tail
      ctx.fillRect(x, y + 30, 6, 8);
      // Head
      ctx.fillRect(x + 44, y + 22, 18, 14);
      // Eye
      ctx.fillStyle = '#f7f7f7';
      ctx.fillRect(x + 56, y + 26, 3, 3);
      ctx.fillStyle = '#535353';
      // Legs (alternate)
      if (dino.legFrame === 0) {
        ctx.fillRect(x + 14, y + 42, 6, 5);
        ctx.fillRect(x + 30, y + 42, 4, 3);
      } else {
        ctx.fillRect(x + 14, y + 42, 4, 3);
        ctx.fillRect(x + 30, y + 42, 6, 5);
      }
      return;
    }

    // Standing / jumping dino
    // Tail
    ctx.fillRect(x, y + 14, 8, 6);
    // Body
    ctx.fillRect(x + 4, y + 14, 22, 22);
    // Head
    ctx.fillRect(x + 22, y, 22, 22);
    ctx.fillRect(x + 26, y - 4, 16, 4);
    // Mouth (small bite out)
    ctx.fillStyle = '#f7f7f7';
    ctx.fillRect(x + 38, y + 16, 6, 2);
    // Eye
    if (dino.deadFrame) {
      // X eye
      ctx.fillStyle = '#535353';
      ctx.fillRect(x + 34, y + 6, 2, 2);
      ctx.fillRect(x + 38, y + 6, 2, 2);
      ctx.fillRect(x + 36, y + 8, 2, 2);
      ctx.fillRect(x + 34, y + 10, 2, 2);
      ctx.fillRect(x + 38, y + 10, 2, 2);
    } else {
      ctx.fillRect(x + 36, y + 6, 4, 4);
      ctx.fillStyle = '#535353';
      ctx.fillRect(x + 37, y + 7, 2, 2);
    }
    ctx.fillStyle = '#535353';

    // Arm
    ctx.fillRect(x + 22, y + 24, 6, 4);

    // Legs
    if (!dino.onGround) {
      // Mid-jump: both feet tucked
      ctx.fillRect(x + 8, y + 36, 6, 8);
      ctx.fillRect(x + 18, y + 36, 6, 8);
      ctx.fillRect(x + 8, y + 42, 10, 4);
      ctx.fillRect(x + 18, y + 42, 10, 4);
    } else if (dino.legFrame === 0) {
      ctx.fillRect(x + 8, y + 36, 6, 11);
      ctx.fillRect(x + 8, y + 45, 10, 2);
      ctx.fillRect(x + 18, y + 36, 6, 6);
      ctx.fillRect(x + 18, y + 40, 4, 2);
    } else {
      ctx.fillRect(x + 8, y + 36, 6, 6);
      ctx.fillRect(x + 8, y + 40, 4, 2);
      ctx.fillRect(x + 18, y + 36, 6, 11);
      ctx.fillRect(x + 18, y + 45, 10, 2);
    }
  }

  function drawScore() {
    ctx.fillStyle = '#535353';
    ctx.font = 'bold 16px "Courier New", monospace';
    ctx.textAlign = 'right';

    const sc = Math.floor(state.score).toString().padStart(5, '0');
    let display = sc;
    // Flash effect on milestone (toggle visibility)
    if (state.flash > 0 && Math.floor(state.flash / 3) % 2 === 0) {
      display = '     ';
    }
    ctx.fillText(display, W - 20, 30);

    if (state.hi > 0) {
      ctx.fillText('HI ' + state.hi.toString().padStart(5, '0'), W - 100, 30);
    }
    ctx.textAlign = 'left';
  }

  function drawGameOver() {
    ctx.fillStyle = '#535353';
    ctx.font = 'bold 22px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('G A M E   O V E R', W / 2, 80);
    ctx.font = '13px "Courier New", monospace';
    ctx.fillText('Press SPACE to restart', W / 2, 110);
    ctx.textAlign = 'left';
  }

  function drawIntro() {
    ctx.fillStyle = '#535353';
    ctx.font = 'bold 18px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Press SPACE to start', W / 2, 90);
    ctx.textAlign = 'left';
  }

  function render() {
    ctx.clearRect(0, 0, W, H);

    // Clouds
    for (const c of state.clouds) drawCloud(c);

    // Ground
    drawGround();

    // Obstacles
    for (const o of state.obstacles) {
      if (o.type === 'cactus') drawCactus(o);
      else drawBird(o);
    }

    // Dino
    drawDino();

    // UI
    drawScore();
    if (!state.started) drawIntro();
    if (state.over) drawGameOver();
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }

  // Initial idle clouds
  state.clouds.push({ x: 200, y: 40, w: 46, h: 14 });
  state.clouds.push({ x: 500, y: 70, w: 46, h: 14 });

  loop();
})();
</script>
</body>
</html>
